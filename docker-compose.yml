version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: italiancar-rifa
    ports:
      - "3000:3000"
    environment:
      # Database
      DATABASE_URL: ${DATABASE_URL}
      
      # JWT & Auth
      JWT_SECRET: ${JWT_SECRET}
      VITE_APP_ID: ${VITE_APP_ID}
      OAUTH_SERVER_URL: ${OAUTH_SERVER_URL}
      VITE_OAUTH_PORTAL_URL: ${VITE_OAUTH_PORTAL_URL}
      OWNER_OPEN_ID: ${OWNER_OPEN_ID}
      OWNER_NAME: ${OWNER_NAME}
      
      # SafefyPay
      SAFEFY_PUBLIC_KEY: ${SAFEFY_PUBLIC_KEY}
      SAFEFY_SECRET_KEY: ${SAFEFY_SECRET_KEY}
      SAFEFY_OFFLINE_MODE: ${SAFEFY_OFFLINE_MODE:-false}
      
      # Manus APIs
      BUILT_IN_FORGE_API_URL: ${BUILT_IN_FORGE_API_URL}
      BUILT_IN_FORGE_API_KEY: ${BUILT_IN_FORGE_API_KEY}
      VITE_FRONTEND_FORGE_API_URL: ${VITE_FRONTEND_FORGE_API_URL}
      VITE_FRONTEND_FORGE_API_KEY: ${VITE_FRONTEND_FORGE_API_KEY}
      
      # App Config
      VITE_APP_TITLE: ${VITE_APP_TITLE:-ItalianCar - Rifa Solidária}
      VITE_APP_LOGO: ${VITE_APP_LOGO}
      
      # Analytics (Optional)
      VITE_ANALYTICS_ENDPOINT: ${VITE_ANALYTICS_ENDPOINT}
      VITE_ANALYTICS_WEBSITE_ID: ${VITE_ANALYTICS_WEBSITE_ID}
      
      # Node
      NODE_ENV: production
    
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    networks:
      - italiancar-network
    
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: italiancar-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-italiancar_rifa}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    
    volumes:
      - db_data:/var/lib/mysql
    
    ports:
      - "3306:3306"
    
    restart: unless-stopped
    
    networks:
      - italiancar-network
    
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  italiancar-network:
    driver: bridge

volumes:
  db_data:
    driver: local
